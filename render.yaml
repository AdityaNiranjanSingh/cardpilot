services:
  - type: web
    name: cardpilot-web
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_HTTPS_ONLY
        value: "1"
      - key: ADMIN_EMAIL
        value: admin@cardpilot.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cardpilot-db
          property: connectionString

databases:
  - name: cardpilot-db
    plan: starter
